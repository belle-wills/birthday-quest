<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mum's Birthday Quest</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="card-screen">
  <div class="balloon b1">🎈</div>
  <div class="balloon b2">🎈</div>
  <div class="balloon b3">🎈</div>
  <div class="balloon b4">🎈</div>

  <div class="card">
    <h1 class="birthday-title">
      <span>🎂</span>
      <span>Penblwydd Hapus Mum!</span>
      <span>🎂</span>
    </h1>

    <p>Open your birthday surprise...</p>
    <button id="open-card-btn">🎉 Open Card 🎉</button>
  </div>
</div>

<div id="game-screen">
  <div id="game-container"></div>
  <button id="restart-html-btn">🎁 Start Again</button>
</div>

<script>
let gameStarted = false;

document.getElementById("restart-html-btn").addEventListener("click", () => {
  window.location.reload();
});

// Party poppers on opening page clicks
document.addEventListener("click", (e) => {
  if (gameStarted) return;

  for (let i = 0; i < 8; i++) {
    const pop = document.createElement("div");
    pop.className = "party-pop";
    pop.textContent = ["🎉", "🎊", "✨", "💖"][Math.floor(Math.random() * 4)];
    pop.style.left = e.clientX + Phaser.Math.Between(-80, 80) + "px";
    pop.style.top = e.clientY + Phaser.Math.Between(-80, 80) + "px";
    document.body.appendChild(pop);

    setTimeout(() => pop.remove(), 900);
  }
});

document.getElementById("open-card-btn").addEventListener("click", () => {
  if (gameStarted) return;

  gameStarted = true;

  new Phaser.Game(config);
});

const isMobile = window.innerWidth < 768;

const GAME_WIDTH = isMobile ? window.innerWidth : 1670;
const GAME_HEIGHT = isMobile ? window.innerHeight : 865;

const minX = isMobile ? 40 : 80;
const maxX = isMobile ? GAME_WIDTH - 40 : 1590;
const bottomY = isMobile ? GAME_HEIGHT + 60 : 900;
const maxItemSpeed = isMobile ? 7 : 8;

const config = {
  type: Phaser.AUTO,
  parent: "game-container",
  width: GAME_WIDTH,
  height: GAME_HEIGHT,
  backgroundColor: "#ffe4ec",

  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },

  physics: {
    default: "arcade",
    arcade: { gravity: { y: 0 } }
  },

  scene: { preload, create, update }
};

function preload() {
  this.load.image('player', 'assets/character.png');
  this.load.image('flower', 'assets/flower.png');
  this.load.image('leo', 'assets/leo.png');
  this.load.image('motorbike', 'assets/motorbike.png');
  this.load.image('book', 'assets/book.png');
  this.load.image('backgroundDesktop', 'assets/background.png');
  this.load.image('backgroundMobile', 'assets/mobile-background.png');
}

function create() {
  const cardScreen = document.getElementById("card-screen");
  const gameScreen = document.getElementById("game-screen");
    

  gameScreen.style.display = "block";

  this.time.delayedCall(150, () => {
  cardScreen.style.opacity = "0";

  setTimeout(() => {
      cardScreen.style.display = "none";
  }, 300);
  });
  this.gameOver = false;
  this.playerSpeed = isMobile ? 10 : 20;
  this.itemSpeed = isMobile ? 2.0 : 1.8;
  this.lives = 3;
  this.nextSpeedIncrease = 5;

  const bgKey = isMobile ? "backgroundMobile" : "backgroundDesktop";

  this.background = this.add.image(
      GAME_WIDTH / 2,
      GAME_HEIGHT / 2,
      bgKey
  );

  if (isMobile) {
    const scale = Math.max(
        GAME_WIDTH / this.background.width,
        GAME_HEIGHT / this.background.height
    );

    this.background.setScale(scale);
  } else {
    this.background.setDisplaySize(GAME_WIDTH, GAME_HEIGHT);
  }

  this.player = this.add.sprite(
      isMobile ? GAME_WIDTH / 2 : 430,
      isMobile ? GAME_HEIGHT - 170 : 690,
      'player'
  );

  this.player.setScale(isMobile ? 0.5 : 0.65);

  this.cursor = this.input.keyboard.createCursorKeys();

  this.input.on("pointerdown", pointer => {
    if (isMobile && !this.gameOver) {
        this.player.x = Phaser.Math.Clamp(pointer.x, minX, maxX);
    }
  });

  this.input.on("pointermove", pointer => {
      if (isMobile && pointer.isDown && !this.gameOver) {
          this.player.x = Phaser.Math.Clamp(pointer.x, minX, maxX);
      }
  });

  this.score = 0;
  this.scoreText = this.add.text(
      isMobile ? 15 : 35,
      isMobile ? 20 : 25,
      'Score: 0',
      {
          fontFamily: 'Georgia',
          fontSize: isMobile ? '22px' : '28px',
          color: '#ffffff',
          stroke: '#000000',
          strokeThickness: 4
      }
  );

  this.livesText = this.add.text(
      isMobile ? 210 : 760,
      isMobile ? 20 : 25,
      'Lives: ❤️❤️❤️',
      {
          fontFamily: 'Georgia',
          fontSize: isMobile ? '22px' : '28px',
          color: '#ffffff',
          stroke: '#000000',
          strokeThickness: 4
      }
  );

  this.items = [];

  const itemTypes = ['flower', 'motorbike', 'leo', 'book'];

  for (let i = 0; i < 4; i++) {
    const type = itemTypes[i];
    const item = this.add.sprite(
        Phaser.Math.Between(minX, maxX),
        Phaser.Math.Between(-500, -50),
        type
    );

    if (type === 'flower') item.setScale(isMobile ? 0.07 : 0.10);
    else if (type === 'motorbike') item.setScale(isMobile ? 0.17 : 0.25);
    else if (type === 'leo') item.setScale(isMobile ? 0.17 : 0.25);
    else if (type === 'book') item.setScale(isMobile ? 0.15 : 0.22);

    item.speedOffset = Phaser.Math.FloatBetween(0, 0.3);

    this.items.push(item);
  }
}


function update() {
  if (this.gameOver) return;

    if (this.cursor.left.isDown && this.player.x > minX) {
    this.player.x -= this.playerSpeed;
    }

    if (this.cursor.right.isDown && this.player.x < maxX) {
    this.player.x += this.playerSpeed;
    }

    if (this.score >= this.nextSpeedIncrease) {
      this.itemSpeed = Math.min(this.itemSpeed + 0.25, maxItemSpeed);
      this.nextSpeedIncrease += 5;
    }

    this.items.forEach(item => {
      item.y += this.itemSpeed + item.speedOffset;

      if (item.y > bottomY) {
        this.lives--;

        if (this.lives === 2) this.livesText.setText("Lives: ❤️❤️");
        if (this.lives === 1) this.livesText.setText("Lives: ❤️");

        if (this.lives === 0) {
          showGameOver.call(this);
          return;
        }

      item.y = Phaser.Math.Between(-300, -50);
      item.x = Phaser.Math.Between(minX, maxX);
      }

      if (
        Phaser.Geom.Intersects.RectangleToRectangle(
          new Phaser.Geom.Rectangle(
            this.player.x - (isMobile ? 35 : 70),
            this.player.y - (isMobile ? 25 : 50),
            isMobile ? 70 : 140,
            isMobile ? 50 : 100
          ),
          item.getBounds()
        )
      ) {
        this.score += 1;
        this.scoreText.setText('Score: ' + this.score);

        item.y = Phaser.Math.Between(-300, -50);
        item.x = Phaser.Math.Between(minX, maxX);
      }
  });
}

function showGameOver() {
  this.livesText.setText("Lives:");
  this.gameOver = true;

  this.items.forEach(item => item.setVisible(false));

  const centreX = this.cameras.main.width / 2;
  const centreY = this.cameras.main.height / 2;

  this.add.rectangle(
    centreX,
    centreY,
    isMobile ? GAME_WIDTH - 40 : 850,
    isMobile ? 260 : 300,
    0x000000,
    0.6
  );

  this.add.text(centreX, centreY - 90, "💔 Mum missed too many presents!", {
    fontFamily: "Georgia",
    fontSize: isMobile ? "24px" : "42px",
    color: "#FFE4EC",
    stroke: "#000000",
    strokeThickness: 8
  }).setOrigin(0.5);

  this.add.text(centreX, centreY - 10, "Final Score: " + this.score, {
    fontFamily: "Georgia",
    fontSize: isMobile ? "22px" : "34px",
    color: "#ffffff",
    stroke: "#000000",
    strokeThickness: 6
  }).setOrigin(0.5);

  document.getElementById("restart-html-btn").style.display = "block";

}
</script>
</body>
</html>
